databaseChangeLog:
  - changeSet:
      id: 05052026-create-brands-table
      author: bogdan_lopatenko
      changes:
        - createTable:
            tableName: brands
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(70)
                  constraints:
                    unique: true
                    nullable: false
