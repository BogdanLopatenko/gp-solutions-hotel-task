databaseChangeLog:
  - changeSet:
      id: 05052026-create-hotels-table
      author: bogdan_lopatenko
      changes:
        - createTable:
            tableName: hotels
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(150)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: brand_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: house_number
                  type: varchar(20)
                  constraints:
                    nullable: true
              - column:
                  name: street
                  type: varchar(150)
                  constraints:
                    nullable: true
              - column:
                  name: city
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: post_code
                  type: varchar(20)
                  constraints:
                    nullable: true
              - column:
                  name: phone
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: check_in
                  type: time
                  constraints:
                    nullable: false
              - column:
                  name: check_out
                  type: time
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseColumnNames: brand_id
            baseTableName: hotels
            referencedColumnNames: id
            referencedTableName: brands
            constraintName: fk_brands_hotels

        - createIndex:
            tableName: hotels
            columns:
              - column:
                  name: city

        - createIndex:
            tableName: hotels
            columns:
              - column:
                  name: country

        - createIndex:
            tableName: hotels
            columns:
              - column:
                  name: brand