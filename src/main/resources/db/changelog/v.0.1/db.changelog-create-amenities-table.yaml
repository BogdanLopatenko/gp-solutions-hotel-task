databaseChangeLog:
  - changeSet:
      id: 05052026-create-amenities-table
      author: bogdan_lopatenko
      changes:
        - createTable:
            tableName: amenities
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(150)
                  constraints:
                    unique: true
                    nullable: false